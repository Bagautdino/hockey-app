# ─── HTTP-only server ────────────────────────────────────────
# This config is ALWAYS loaded. It serves three purposes:
#   1. Let's Encrypt ACME HTTP-01 challenge (/.well-known/acme-challenge/)
#   2. API reverse proxy (/api/ → backend:8000)
#   3. SPA static files (/ → /usr/share/nginx/html with try_files fallback)
#
# Once SSL certs are obtained, deploy.sh generates ssl.conf which adds
# an HTTPS server block and a 301 redirect. This file stays as-is even
# after SSL is enabled (ACME renewal still needs port 80).
#
# IMPORTANT: The frontend static files are served directly by this nginx
# from the `frontend_dist` Docker volume mounted at /usr/share/nginx/html.
# There is NO separate "frontend" container to proxy to. This eliminates
# the entire class of "upstream not found" / 502 errors.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Let's Encrypt challenge ──
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Backend API ──
    # "backend" is the Docker Compose service name, resolved via Docker DNS.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 600M;
    }

    # ── Frontend SPA ──
    # try_files serves the file if it exists, otherwise falls back to
    # index.html so that React Router handles client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──
    location ~* \.(js|css|png|jpg|jpeg|svg|ico|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Gzip ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
}
