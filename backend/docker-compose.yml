services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hockey
      POSTGRES_PASSWORD: hockey
      POSTGRES_DB: hockey_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hockey -d hockey_db"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/hockey-videos --ignore-existing;
      mc anonymous set download local/hockey-videos;
      echo 'Bucket ready';
      "

volumes:
  pgdata:
  miniodata:
